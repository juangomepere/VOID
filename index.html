<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VOID</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto}
.screen{display:none;flex-direction:column;align-items:center}
.screen.active{display:flex}
/* ── LANDING ── */
#s-landing{gap:48px}
.void-title{font-size:88px;letter-spacing:24px;color:#fff;text-shadow:0 0 60px rgba(255,255,255,.4);font-weight:bold}
.landing-row{display:flex;gap:16px}
.btn{background:transparent;border:1px solid #2a2a2a;color:#666;font-family:'Courier New',monospace;font-size:12px;letter-spacing:3px;padding:12px 28px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn:hover,.btn.active-btn{border-color:#fff;color:#fff;box-shadow:0 0 16px rgba(255,255,255,.1)}
.btn:disabled{opacity:.3;cursor:not-allowed}
#join-form{display:none;flex-direction:column;align-items:center;gap:10px;margin-top:-16px}
#join-form input{background:transparent;border:1px solid #2a2a2a;color:#fff;font-family:'Courier New',monospace;font-size:28px;letter-spacing:10px;padding:10px 20px;text-align:center;width:220px;transition:border-color .2s}
#join-form input:focus{outline:none;border-color:#555}
/* ── LOBBY ── */
#s-lobby{gap:22px;max-width:640px;width:100%;padding:40px 24px 60px}
.lbl{font-size:9px;letter-spacing:4px;color:#333;text-transform:uppercase;margin-bottom:6px}
.room-code{font-size:52px;letter-spacing:14px;color:#fff;text-shadow:0 0 24px rgba(255,255,255,.3)}
.slot-row{display:flex;gap:10px}
.slot-btn{background:transparent;border:1px solid #1a1a1a;color:#333;font-family:'Courier New',monospace;font-size:11px;letter-spacing:2px;padding:8px 18px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.slot-btn:hover,.slot-btn.sel{border-color:#555;color:#aaa}
.slot-btn.sel{border-color:#fff;color:#fff}
.color-grid{display:grid;grid-template-columns:repeat(5,38px);gap:5px}
.swatch{width:38px;height:38px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;position:relative;flex-shrink:0}
.swatch:not(.taken):hover{transform:scale(1.18);border-color:rgba(255,255,255,.6)}
.swatch.taken{opacity:.15;cursor:not-allowed}
.swatch.picked::after{content:attr(data-label);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;color:#000;pointer-events:none}
.player-list{width:100%;border-top:1px solid #0f0f0f}
.p-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #0f0f0f}
.p-dot-sm{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.p-name{font-size:11px;color:#555;letter-spacing:1px;flex:1}
.host-tag{font-size:9px;color:#2a2a2a;letter-spacing:2px}
.err{color:#ff4444;font-size:11px;letter-spacing:1px;min-height:14px}
.info{font-size:10px;color:#2a2a2a;letter-spacing:2px}
/* ── GAME ── */
#s-game{gap:0}
#g-top{width:760px;display:flex;align-items:flex-start;justify-content:space-between;padding:8px 0 5px}
.g-timer{font-size:22px;font-weight:bold;letter-spacing:2px;line-height:1}
.g-score{font-size:9px;color:#333;letter-spacing:2px;margin-top:3px}
#g-phase{font-size:9px;letter-spacing:4px;color:#222;text-align:center;padding-top:6px}
#g-main{display:flex}
#c{display:block;background:#000}
#sidebar{width:160px;height:600px;overflow-y:auto;background:#030303;border-left:1px solid #0d0d0d;padding:6px 0}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:#1a1a1a}
.sb-row{display:flex;align-items:center;gap:7px;padding:5px 10px}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-t{font-size:11px;letter-spacing:1px;flex:1}
.sb-sc{font-size:9px;color:#222;letter-spacing:1px}
.sb-row.dead .sb-t{color:#1a1a1a!important;text-decoration:line-through}
.sb-row.dead .sb-dot{opacity:.15}
/* ── END ── */
#s-end{gap:24px;text-align:center}
.end-title{font-size:56px;letter-spacing:6px}
.end-sub{font-size:11px;color:#444;letter-spacing:2px;margin-top:-16px}
.end-stats{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.end-row{display:flex;align-items:center;justify-content:center;gap:10px;font-size:12px;letter-spacing:1px}
.end-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.win-tag{font-size:9px;color:#333;letter-spacing:2px}
.elim-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;letter-spacing:4px;color:#fff;pointer-events:none;opacity:0;transition:opacity .3s;text-align:center;z-index:999}
.elim-msg.show{opacity:1}
</style>
</head>
<body>

<!-- LANDING -->
<div id="s-landing" class="screen active">
  <div class="void-title">VOID</div>
  <div class="landing-row">
    <button class="btn" id="btn-create">Create Room</button>
    <button class="btn" id="btn-join">Join Room</button>
  </div>
  <div id="join-form">
    <input id="code-input" type="text" maxlength="4" placeholder="0000" autocomplete="off" inputmode="numeric">
    <button class="btn" id="btn-join-go">Join →</button>
    <div class="err" id="land-err"></div>
  </div>
</div>

<!-- LOBBY -->
<div id="s-lobby" class="screen">
  <div>
    <div class="lbl">Room Code</div>
    <div class="room-code" id="lobby-code">----</div>
  </div>
  <div>
    <div class="lbl">Players on this device</div>
    <div class="slot-row">
      <button class="slot-btn" id="slot1-btn">1 Player &nbsp;(WASD)</button>
      <button class="slot-btn" id="slot2-btn">2 Players &nbsp;(WASD + Arrows)</button>
    </div>
  </div>
  <div id="picker0-wrap">
    <div class="lbl" id="picker0-lbl">Your Color</div>
    <div class="color-grid" id="grid0"></div>
  </div>
  <div id="picker1-wrap" style="display:none">
    <div class="lbl">Player 2 Color (Arrows)</div>
    <div class="color-grid" id="grid1"></div>
  </div>
  <div class="player-list" id="lobby-list"></div>
  <button class="btn" id="start-btn" style="display:none">Start Game</button>
  <div class="info" id="lobby-wait">Waiting for host to start...</div>
  <div class="err" id="lobby-err"></div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div id="g-top">
    <div id="hud0">
      <div class="g-timer" id="t0">01:00</div>
      <div class="g-score" id="sc0">0 clocks</div>
    </div>
    <div id="g-phase">FASE CIEGA</div>
    <div id="hud1" style="text-align:right;display:none">
      <div class="g-timer" id="t1">01:00</div>
      <div class="g-score" id="sc1">0 clocks</div>
    </div>
  </div>
  <div id="g-main">
    <canvas id="c" width="600" height="600"></canvas>
    <div id="sidebar"></div>
  </div>
</div>

<!-- END -->
<div id="s-end" class="screen">
  <div class="end-title" id="end-title">VOID</div>
  <div class="end-sub" id="end-sub"></div>
  <div class="end-stats" id="end-stats"></div>
  <button class="btn" id="play-again" style="display:none">Play Again</button>
  <div class="info" id="end-wait" style="display:none">Waiting for host...</div>
</div>

<div class="elim-msg" id="elim-msg"></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const COLS=25,ROWS=25,CS=24;
const PALETTE=[
  '#00E5FF','#FF6B35','#39FF14','#FF00FF','#FFD700',
  '#FF1744','#7C4DFF','#00E676','#FF6D00','#18FFFF',
  '#FF4081','#69F0AE','#40C4FF','#EA80FC','#FFFF00',
  '#FF6E40','#B2FF59','#84FFFF','#FF80AB','#CCF600',
  '#FFFFFF','#FF5252','#448AFF','#F4FF81','#CCFF90'
];
const PHASE_NAMES=['FASE CIEGA','FASE PULSO','FASE SOMBRA','LA NOCHE'];

// ── SEEDED RNG (identical to server) ──────────────────────────────────────────
function mulberry32(a){
  return function(){
    var t=a+=0x6D2B79F5;
    t=Math.imul(t^t>>>15,t|1);
    t^=t+Math.imul(t^t>>>7,t|61);
    return((t^t>>>14)>>>0)/4294967296;
  };
}

function genMaze(seed){
  const rng=mulberry32(seed);
  const W=Array.from({length:ROWS},()=>Array.from({length:COLS},()=>({n:true,s:true,e:true,w:true})));
  const vis=Array.from({length:ROWS},()=>new Array(COLS).fill(false));
  function sh(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  function carve(r,c){
    vis[r][c]=true;
    for(const[dr,dc,wall,opp]of sh([[-1,0,'n','s'],[1,0,'s','n'],[0,1,'e','w'],[0,-1,'w','e']])){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!vis[nr][nc]){
        W[r][c][wall]=false;W[nr][nc][opp]=false;carve(nr,nc);
      }
    }
  }
  carve(0,0);return W;
}

// ── STATE ──────────────────────────────────────────────────────────────────────
let ws=null;
let curScreen='landing';
let myDeviceId=null;
let roomCode=null,hostId=null;
let deviceSlots=0;           // 0=not set, 1 or 2
let myPlayers=[];            // [{slot,id,color,flashUntil}]
let selColors=[null,null];   // chosen colors per local slot

// Game state (from server)
let maze=null;
let srvPlayers=[];           // latest tick
let srvClocks=[];
let phase=0,gtime=0;
let lobbyPlayers=[];

// Client-side visual effects (local-only)
let footprints=[];           // {x,y,life}
let echos=[];                // {x,y,life}
let wallFlashes=[];          // {r,c,dir,life}
let deathBursts=[];          // {x,y,r,life}
let clockReveals=[];         // {cx,cy,startMs}
let areaReveals=[];          // {x,y,color,startMs} — 5×5 hint every 20s, local only
let mazeRevealUntil=0;
let phaseFlash=0;
let latidos=[];              // {cx,cy,r,life,color}
let clockParticles={};       // clockId→[particles]
let clockTimers={};          // clockId→{pulseT,mirrorT}
let prevClockIds=new Set();

// Canvas
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

let lastTs=0;
let loopRunning=false;

// ── WEBSOCKET ──────────────────────────────────────────────────────────────────
function connectWS(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}`);
  ws.onmessage=e=>{let m;try{m=JSON.parse(e.data);}catch{return;}onMsg(m);};
  ws.onclose=()=>setTimeout(connectWS,2000);
  ws.onerror=()=>{};
}
function send(m){if(ws&&ws.readyState===1)ws.send(JSON.stringify(m));}

function onMsg(m){
  switch(m.type){

    case 'init':
      myDeviceId=m.deviceId;
      break;

    case 'roomCreated':
      roomCode=m.code; hostId=m.host;
      showScreen('lobby');
      document.getElementById('lobby-code').textContent=m.code;
      refreshStartBtn();
      break;

    case 'joinedRoom':
      roomCode=m.code; hostId=m.host;
      lobbyPlayers=m.players||[];
      showScreen('lobby');
      document.getElementById('lobby-code').textContent=m.code;
      renderLobbyList();
      refreshColorGrids();
      refreshStartBtn();
      break;

    case 'lobbyUpdate':
      lobbyPlayers=m.players||[];
      hostId=m.host;
      renderLobbyList();
      refreshColorGrids();
      refreshStartBtn();
      break;

    case 'colorTaken':
      showErr('lobby-err','Color already taken!');
      break;

    case 'returnToLobby':
      lobbyPlayers=m.players||[];
      hostId=m.host;
      showScreen('lobby');
      document.getElementById('lobby-code').textContent=m.code;
      renderLobbyList();
      refreshColorGrids();
      refreshStartBtn();
      break;

    case 'gameStart':
      onGameStart(m);
      break;

    case 'tick':
      onTick(m);
      break;

    case 'clockSpawned':
      clockReveals.push({cx:m.clock.x,cy:m.clock.y,startMs:performance.now()});
      break;

    case 'clockCollected':
      echos.push({x:m.clockX,y:m.clockY,life:1});
      break;

    case 'eliminated':
      onEliminated(m.playerId);
      break;

    case 'phaseChange':
      phase=m.phase;
      phaseFlash=0.15;
      document.getElementById('g-phase').textContent=PHASE_NAMES[m.phase]||'';
      break;

    case 'mazeBreath':
      onMazeBreath(m.cells);
      break;

    case 'gameOver':
      onGameOver(m);
      break;

    case 'wallHit':
      wallFlashes.push({r:m.y,c:m.x,dir:m.dir,life:1});
      const mp=myPlayers.find(p=>p.slot===m.slot);
      if(mp)mp.flashUntil=performance.now()+300;
      break;

    case 'error':
      showErr('land-err',m.msg);
      showErr('lobby-err',m.msg);
      break;
  }
}

// ── SCREEN MANAGEMENT ──────────────────────────────────────────────────────────
function showScreen(name){
  curScreen=name;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
}

function showErr(id,msg){
  const el=document.getElementById(id);
  if(!el)return;
  el.textContent=msg;
  setTimeout(()=>el.textContent='',3000);
}

// ── LANDING ────────────────────────────────────────────────────────────────────
document.getElementById('btn-create').onclick=()=>send({type:'createRoom'});

document.getElementById('btn-join').onclick=()=>{
  const f=document.getElementById('join-form');
  f.style.display=f.style.display==='none'?'flex':'none';
  if(f.style.display==='flex')document.getElementById('code-input').focus();
};

document.getElementById('btn-join-go').onclick=joinRoom;
document.getElementById('code-input').onkeydown=e=>{if(e.key==='Enter')joinRoom();};

function joinRoom(){
  const code=document.getElementById('code-input').value.trim();
  if(code.length!==4){showErr('land-err','Enter a 4-digit code');return;}
  send({type:'joinRoom',code});
}

// ── LOBBY ──────────────────────────────────────────────────────────────────────
function refreshStartBtn(){
  const iAmHost=myDeviceId&&hostId&&myDeviceId===hostId;
  document.getElementById('start-btn').style.display=iAmHost?'block':'none';
  document.getElementById('lobby-wait').style.display=iAmHost?'none':'block';
}

document.getElementById('slot1-btn').onclick=()=>setSlotMode(1);
document.getElementById('slot2-btn').onclick=()=>setSlotMode(2);

function setSlotMode(n){
  deviceSlots=n;
  document.getElementById('slot1-btn').classList.toggle('sel',n===1);
  document.getElementById('slot2-btn').classList.toggle('sel',n===2);
  document.getElementById('picker1-wrap').style.display=n===2?'block':'none';
  document.getElementById('picker0-lbl').textContent=n===2?'Player 1 Color (WASD)':'Your Color';
  if(n===1&&selColors[1]){
    selColors[1]=null;
    myPlayers=myPlayers.filter(p=>p.slot!==1);
    send({type:'removeSlot',slot:1});
  }
  refreshColorGrids();
}

function buildColorGrid(slotIdx){
  const grid=document.getElementById(`grid${slotIdx}`);
  grid.innerHTML='';
  PALETTE.forEach(color=>{
    const sw=document.createElement('div');
    sw.className='swatch';
    sw.style.background=color;
    sw.dataset.color=color;
    sw.dataset.label=slotIdx===0?'1':'2';
    sw.onclick=()=>pickColor(slotIdx,color,sw);
    grid.appendChild(sw);
  });
}

function pickColor(slot,color,sw){
  if(sw.classList.contains('taken'))return;
  selColors[slot]=color;
  const existing=myPlayers.find(p=>p.slot===slot);
  if(existing)existing.color=color;
  else myPlayers.push({slot,id:null,color,flashUntil:0});
  send({type:'setColor',slot,color});
  refreshColorGrids();
}

function refreshColorGrids(){
  const takenByOthers=new Set(
    lobbyPlayers.filter(p=>p.deviceId!==myDeviceId).map(p=>p.color)
  );
  [0,1].forEach(si=>{
    const grid=document.getElementById(`grid${si}`);
    if(!grid)return;
    const other=selColors[1-si];
    grid.querySelectorAll('.swatch').forEach(sw=>{
      const c=sw.dataset.color;
      const blocked=takenByOthers.has(c)||(other===c);
      sw.classList.toggle('taken',blocked);
      sw.classList.remove('picked');
      if(selColors[si]===c)sw.classList.add('picked');
    });
  });
}

function renderLobbyList(){
  const list=document.getElementById('lobby-list');
  list.innerHTML='';
  lobbyPlayers.forEach(p=>{
    const row=document.createElement('div');
    row.className='p-row';
    const isHost=p.deviceId===hostId;
    row.innerHTML=`
      <div class="p-dot-sm" style="background:${p.color};box-shadow:0 0 5px ${p.color}"></div>
      <div class="p-name">${p.color}</div>
      ${isHost?'<div class="host-tag">HOST</div>':''}
    `;
    list.appendChild(row);
  });
}

document.getElementById('start-btn').onclick=()=>send({type:'startGame'});

buildColorGrid(0);
buildColorGrid(1);

// ── GAME START ─────────────────────────────────────────────────────────────────
function onGameStart(m){
  maze=genMaze(m.seed);
  srvPlayers=m.players||[];
  srvClocks=[];phase=0;gtime=0;

  // Match local player IDs from server player list
  myPlayers.forEach(mp=>{
    const sp=srvPlayers.find(p=>p.deviceId===myDeviceId&&p.slot===mp.slot);
    if(sp)mp.id=sp.id;
  });

  // Reset effects
  footprints=[];echos=[];wallFlashes=[];deathBursts=[];
  clockReveals=[];areaReveals=[];clockParticles={};clockTimers={};
  latidos=[];prevClockIds=new Set();phaseFlash=0;

  // Maze reveal (2 seconds at start)
  mazeRevealUntil=performance.now()+2000;

  // Setup HUD
  document.getElementById('g-phase').textContent=PHASE_NAMES[0];
  setupHUD();

  showScreen('game');
  if(!loopRunning){loopRunning=true;lastTs=performance.now();requestAnimationFrame(gameLoop);}
}

function setupHUD(){
  const mp0=myPlayers.find(p=>p.slot===0);
  const mp1=myPlayers.find(p=>p.slot===1);
  if(mp0){
    document.getElementById('t0').style.color=mp0.color;
    document.getElementById('t0').style.textShadow=`0 0 14px ${mp0.color}`;
  }
  if(mp1){
    document.getElementById('hud1').style.display='block';
    document.getElementById('t1').style.color=mp1.color;
    document.getElementById('t1').style.textShadow=`0 0 14px ${mp1.color}`;
  } else {
    document.getElementById('hud1').style.display='none';
  }
}

function onTick(m){
  const prevGtime=gtime;
  srvPlayers=m.players||[];
  srvClocks=m.clocks||[];
  phase=m.phase;gtime=m.gtime;

  // 20-second area reveal for each local alive player
  if(Math.floor(gtime/20)>Math.floor(prevGtime/20)){
    const now=performance.now();
    const myLocalSrv=myPlayers.map(mp=>srvPlayers.find(p=>p.id===mp.id)).filter(Boolean);
    for(const sp of myLocalSrv){
      if(sp.alive)areaReveals.push({x:sp.x,y:sp.y,color:sp.color,startMs:now});
    }
  }

  // Sync clock effect state
  const newIds=new Set(srvClocks.map(c=>c.id));
  for(const id of prevClockIds){
    if(!newIds.has(id)){delete clockParticles[id];delete clockTimers[id];}
  }
  for(const clock of srvClocks){
    if(!clockParticles[clock.id]){
      clockParticles[clock.id]=[];
      for(let i=0;i<4;i++)clockParticles[clock.id].push(mkParticle(clock.x,clock.y));
      clockTimers[clock.id]={pulseT:0,mirrorT:Math.random()*15};
    }
  }
  prevClockIds=newIds;

  updateHUD();
  updateSidebar();
}

function onEliminated(playerId){
  const sp=srvPlayers.find(p=>p.id===playerId);
  if(sp){
    deathBursts.push({x:ccx(sp.x),y:ccy(sp.y),r:0,life:1});
    const isMe=myPlayers.some(mp=>mp.id===playerId);
    if(isMe)showElimMsg('YOU WERE ELIMINATED');
    else showElimMsg(`P${srvPlayers.indexOf(sp)+1} ELIMINATED`);
  }
}

function showElimMsg(txt){
  const el=document.getElementById('elim-msg');
  el.textContent=txt;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

function onMazeBreath(cells){
  if(!maze)return;
  for(const cell of cells){
    const{r,c,side,open}=cell;
    if(side==='e'){
      maze[r][c].e=!open;
      if(c+1<COLS)maze[r][c+1].w=!open;
    } else if(side==='s'){
      maze[r][c].s=!open;
      if(r+1<ROWS)maze[r+1][c].n=!open;
    }
    wallFlashes.push({r,c,dir:side,life:0.6});
  }
}

function onGameOver(m){
  loopRunning=false;
  const winner=srvPlayers.find(p=>p.id===m.winner)||
    m.stats.find(s=>s.id===m.winner);
  const titleEl=document.getElementById('end-title');
  const subEl=document.getElementById('end-sub');
  if(winner){
    titleEl.textContent='WINNER';
    titleEl.style.color=winner.color;
    titleEl.style.textShadow=`0 0 40px ${winner.color}`;
    const isMe=myPlayers.some(mp=>mp.id===winner.id);
    subEl.textContent=isMe?'You survived.':'They survived.';
  } else {
    titleEl.textContent='EMPATE';
    titleEl.style.color='#fff';
    titleEl.style.textShadow='0 0 40px #fff';
    subEl.textContent='Both timers ran out.';
  }
  const statsEl=document.getElementById('end-stats');
  statsEl.innerHTML=(m.stats||[]).map(s=>{
    const isW=s.id===m.winner;
    return `<div class="end-row">
      <div class="end-dot" style="background:${s.color};box-shadow:0 0 5px ${s.color}"></div>
      <span style="color:${s.color}">${fmt(s.time)}</span>
      <span style="color:#333">·</span>
      <span style="color:#666">${s.score} clocks</span>
      ${isW?'<span class="win-tag">WINNER</span>':''}
    </div>`;
  }).join('');

  const iAmHost=myDeviceId&&hostId&&myDeviceId===hostId;
  document.getElementById('play-again').style.display=iAmHost?'block':'none';
  document.getElementById('end-wait').style.display=iAmHost?'none':'block';
  showScreen('end');
}

document.getElementById('play-again').onclick=()=>send({type:'playAgain'});

// ── HUD ────────────────────────────────────────────────────────────────────────
function fmt(s){
  const t=Math.max(0,s);
  const m=Math.floor(t/60),sec=Math.floor(t%60);
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function updateHUD(){
  const now=performance.now();
  myPlayers.forEach((mp,i)=>{
    const sp=srvPlayers.find(p=>p.id===mp.id);
    if(!sp)return;
    const te=document.getElementById(`t${i}`);
    const se=document.getElementById(`sc${i}`);
    if(te)te.textContent=fmt(sp.time);
    if(se)se.textContent=`${sp.score} clocks`;
    if(te&&sp.alive&&sp.time<20)te.style.opacity=Math.sin(now/120)>0?'1':'0.3';
    else if(te)te.style.opacity='1';
  });
  document.getElementById('g-phase').textContent=PHASE_NAMES[phase]||'';
}

function updateSidebar(){
  document.getElementById('sidebar').innerHTML=srvPlayers.map(p=>{
    const isMe=myPlayers.some(mp=>mp.id===p.id);
    return `<div class="sb-row${p.alive?'':' dead'}">
      <div class="sb-dot" style="background:${p.color};${p.alive?`box-shadow:0 0 4px ${p.color}`:''}"></div>
      <div class="sb-t" style="color:${p.alive?p.color:'#1a1a1a'}">${fmt(p.time)}</div>
      <div class="sb-sc">${p.score}⏱</div>
    </div>`;
  }).join('');
}

// ── PARTICLES ──────────────────────────────────────────────────────────────────
function mkParticle(cx,cy){
  const ang=Math.random()*Math.PI*2,spd=0.25+Math.random()*0.4;
  return{
    px:cx+.5,py:cy+.5,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    life:1,decay:0.12+Math.random()*0.15,
    maxDist:2+Math.random()*2,ox:cx,oy:cy
  };
}

function updateParticles(dt){
  for(const clock of srvClocks){
    const parts=clockParticles[clock.id];
    if(!parts)continue;
    for(let i=0;i<parts.length;i++){
      const p=parts[i];
      p.life-=p.decay*dt;
      const nx=p.px+p.vx*dt,ny=p.py+p.vy*dt;
      const dist=Math.hypot(nx-p.ox-.5,ny-p.oy-.5);
      let blocked=false;
      if(maze){
        const gc=Math.floor(p.px),gr=Math.floor(p.py);
        const nc=Math.floor(nx),nr=Math.floor(ny);
        if(nc!==gc&&gc>=0&&gc<COLS&&gr>=0&&gr<ROWS){
          if(maze[gr][gc][nc>gc?'e':'w'])blocked=true;
        }
        if(nr!==gr&&!blocked&&gc>=0&&gc<COLS&&gr>=0&&gr<ROWS){
          if(maze[gr][gc][nr>gr?'s':'n'])blocked=true;
        }
      }
      if(!blocked&&dist<p.maxDist){p.px=nx;p.py=ny;}
      else p.life=0;
      if(p.life<=0)parts[i]=mkParticle(clock.x,clock.y);
    }
  }
}

// ── RENDER HELPERS ─────────────────────────────────────────────────────────────
function ccx(x){return x*CS+CS/2;}
function ccy(y){return y*CS+CS/2;}

function drawWall(r,c,dir,alpha){
  if(!maze||r<0||r>=ROWS||c<0||c>=COLS)return;
  const x0=c*CS,y0=r*CS;
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();
  if(dir==='n'){ctx.moveTo(x0,y0);ctx.lineTo(x0+CS,y0);}
  else if(dir==='s'){ctx.moveTo(x0,y0+CS);ctx.lineTo(x0+CS,y0+CS);}
  else if(dir==='w'){ctx.moveTo(x0,y0);ctx.lineTo(x0,y0+CS);}
  else if(dir==='e'){ctx.moveTo(x0+CS,y0);ctx.lineTo(x0+CS,y0+CS);}
  ctx.stroke();ctx.restore();
}

function drawMazeSection(sx,sy,w,h,alpha,color='#fff'){
  if(!maze)return;
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.lineCap='square';
  for(let r=Math.max(0,sy);r<Math.min(ROWS,sy+h);r++){
    for(let c=Math.max(0,sx);c<Math.min(COLS,sx+w);c++){
      const cell=maze[r][c];
      const x0=c*CS,y0=r*CS;
      ctx.beginPath();
      if(cell.n){ctx.moveTo(x0,y0);ctx.lineTo(x0+CS,y0);}
      if(cell.s){ctx.moveTo(x0,y0+CS);ctx.lineTo(x0+CS,y0+CS);}
      if(cell.w){ctx.moveTo(x0,y0);ctx.lineTo(x0,y0+CS);}
      if(cell.e){ctx.moveTo(x0+CS,y0);ctx.lineTo(x0+CS,y0+CS);}
      ctx.stroke();
    }
  }
  ctx.restore();
}

function nearestClockDist(sp){
  let min=Infinity;
  for(const c of srvClocks){
    const d=Math.abs(sp.x-c.x)+Math.abs(sp.y-c.y);
    if(d<min)min=d;
  }
  return min;
}

function lerpColor(a,b,t){
  const ar=parseInt(a.slice(1,3),16),ag=parseInt(a.slice(3,5),16),ab=parseInt(a.slice(5,7),16);
  const br=parseInt(b.slice(1,3),16),bg=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);
  const r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),bv=Math.round(ab+(bb-ab)*t);
  return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${bv.toString(16).padStart(2,'0')}`;
}

function proximityColor(sp,now){
  const d=nearestClockDist(sp);
  if(d<=1)return Math.sin(now/60)>0?'#ffffff':sp.color;
  if(d<=4)return lerpColor(sp.color,'#ffffff',(1-d/4)*0.75);
  return sp.color;
}

// ── GAME LOOP ──────────────────────────────────────────────────────────────────
function gameLoop(ts){
  if(!loopRunning){return;}
  const dt=Math.min((ts-lastTs)/1000,0.05);
  lastTs=ts;
  update(dt,ts);
  draw(ts);
  requestAnimationFrame(gameLoop);
}

function update(dt,now){
  // Footprints
  for(let i=footprints.length-1;i>=0;i--){
    footprints[i].life-=dt/5;
    if(footprints[i].life<=0)footprints.splice(i,1);
  }
  const myLocalSrv=myPlayers.map(mp=>srvPlayers.find(p=>p.id===mp.id)).filter(Boolean);
  for(const sp of myLocalSrv){
    if(!sp.alive)continue;
    for(const clock of srvClocks){
      const d=Math.abs(sp.x-clock.x)+Math.abs(sp.y-clock.y);
      if(d<=3&&!footprints.some(f=>f.x===sp.x&&f.y===sp.y))
        footprints.push({x:sp.x,y:sp.y,life:1});
    }
  }

  // Echos
  for(let i=echos.length-1;i>=0;i--){echos[i].life-=dt/10;if(echos[i].life<=0)echos.splice(i,1);}
  // Wall flashes
  for(let i=wallFlashes.length-1;i>=0;i--){wallFlashes[i].life-=dt/1.5;if(wallFlashes[i].life<=0)wallFlashes.splice(i,1);}
  // Death bursts
  for(let i=deathBursts.length-1;i>=0;i--){
    deathBursts[i].r+=80*dt;deathBursts[i].life-=1.8*dt;
    if(deathBursts[i].life<=0)deathBursts.splice(i,1);
  }
  // Clock reveals
  clockReveals=clockReveals.filter(r=>now-r.startMs<1500);
  // Area reveals (expire after 3s)
  areaReveals=areaReveals.filter(r=>now-r.startMs<3000);

  // Clock timers → latidos
  for(const clock of srvClocks){
    const ct=clockTimers[clock.id];
    if(!ct)continue;
    ct.pulseT+=dt;ct.mirrorT+=dt;
    if(ct.pulseT>=8){
      ct.pulseT-=8;
      const anyNear=myLocalSrv.some(sp=>Math.abs(sp.x-clock.x)+Math.abs(sp.y-clock.y)<=2);
      if(anyNear)latidos.push({cx:clock.x,cy:clock.y,r:0,life:1,color:clock.color});
    }
  }
  // Latidos
  for(let i=latidos.length-1;i>=0;i--){
    latidos[i].r+=CS*2*dt;latidos[i].life-=dt/2;
    if(latidos[i].life<=0)latidos.splice(i,1);
  }

  // Particles
  updateParticles(dt);

  // Phase flash
  phaseFlash=Math.max(0,phaseFlash-dt*2);
}

function draw(now){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,600,600);

  // Initial full maze reveal
  if(now<mazeRevealUntil)drawMazeSection(0,0,COLS,ROWS,0.8);

  // Clock-spawn 5×5 reveals
  for(const rev of clockReveals){
    const age=now-rev.startMs;
    const alpha=Math.max(0,1-age/1500)*0.65;
    if(alpha>0)drawMazeSection(rev.cx-2,rev.cy-2,5,5,alpha);
  }

  // Area reveals — 5×5 around each local player, colored, every 20s
  for(const rev of areaReveals){
    const age=now-rev.startMs;
    const alpha=Math.max(0,1-age/3000)*0.7;
    if(alpha>0)drawMazeSection(rev.x-2,rev.y-2,5,5,alpha,rev.color);
  }

  // Wall flashes
  for(const wf of wallFlashes)drawWall(wf.r,wf.c,wf.dir,wf.life);

  // Echos
  ctx.save();
  for(const e of echos){
    ctx.globalAlpha=e.life*0.35;
    ctx.strokeStyle='#fff';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(ccx(e.x),ccy(e.y),10,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();

  // Footprints
  ctx.save();
  for(const fp of footprints){
    ctx.globalAlpha=fp.life*0.25;ctx.fillStyle='#fff';
    ctx.fillRect(fp.x*CS+6,fp.y*CS+6,CS-12,CS-12);
  }
  ctx.restore();

  const myLocalSrv=myPlayers.map(mp=>srvPlayers.find(p=>p.id===mp.id)).filter(Boolean);

  // Clocks + hints
  for(const clock of srvClocks){
    const ct=clockTimers[clock.id];
    const cx=ccx(clock.x),cy=ccy(clock.y);

    // Espejo fugaz: cell above flashes every 15s for 300ms
    if(ct){
      const mp=ct.mirrorT%15;
      if(mp<0.3&&clock.y>0){
        ctx.save();
        ctx.globalAlpha=(1-mp/0.3)*0.4;
        ctx.fillStyle='#fff';
        ctx.fillRect(clock.x*CS,( clock.y-1)*CS,CS,CS);
        ctx.restore();
      }
    }

    // Latido rings (for this clock)
    for(const lat of latidos){
      if(lat.cx!==clock.x||lat.cy!==clock.y)continue;
      ctx.save();
      ctx.globalAlpha=lat.life*0.35;
      ctx.strokeStyle=lat.color;ctx.lineWidth=1;
      ctx.shadowBlur=8;ctx.shadowColor=lat.color;
      ctx.beginPath();ctx.arc(cx,cy,lat.r,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }

    // Shadow reveal check (local players only)
    const revealed=clock.type!=='shadow'||
      myLocalSrv.some(sp=>Math.abs(sp.x-clock.x)+Math.abs(sp.y-clock.y)<=1);

    // Draw clock body
    ctx.save();
    ctx.shadowBlur=18;ctx.shadowColor=clock.color;
    ctx.fillStyle=clock.color;
    ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
    // Shadow erratic pulse when revealed
    if(clock.type==='shadow'&&revealed){
      ctx.globalAlpha=0.5+0.5*Math.sin(now/55);
      ctx.strokeStyle='#ff0000';ctx.lineWidth=2;
      ctx.shadowBlur=14;ctx.shadowColor='#ff0000';
      ctx.beginPath();ctx.arc(cx,cy,8+2*Math.sin(now/55*3),0,Math.PI*2);ctx.stroke();
    }
    ctx.restore();

    // Particles (only if a local player is nearby)
    const anyNear=myLocalSrv.some(sp=>Math.abs(sp.x-clock.x)+Math.abs(sp.y-clock.y)<=5);
    if(anyNear){
      const parts=clockParticles[clock.id];
      if(parts){
        ctx.save();
        for(const p of parts){
          ctx.globalAlpha=p.life*0.65;
          ctx.fillStyle=clock.color;ctx.shadowBlur=4;ctx.shadowColor=clock.color;
          ctx.beginPath();ctx.arc(p.px*CS,p.py*CS,1.5,0,Math.PI*2);ctx.fill();
        }
        ctx.restore();
      }
    }
  }

  // Players
  for(const sp of srvPlayers){
    if(!sp.alive)continue;
    const cx=ccx(sp.x),cy=ccy(sp.y);
    const isLocal=myPlayers.some(mp=>mp.id===sp.id);
    let dotColor=sp.color;
    if(isLocal){
      dotColor=proximityColor(sp,now);
      const mp=myPlayers.find(p=>p.id===sp.id);
      if(mp&&mp.flashUntil&&now<mp.flashUntil)dotColor='#ff2222';
    }
    ctx.save();
    ctx.shadowBlur=22;ctx.shadowColor=dotColor;ctx.fillStyle=dotColor;
    ctx.beginPath();ctx.arc(cx,cy,7,0,Math.PI*2);ctx.fill();
    // Timer arc
    const ratio=Math.max(0,sp.time/60);
    const arcCol=sp.time<20?'#ff2222':sp.color;
    ctx.strokeStyle=arcCol;ctx.lineWidth=2;
    ctx.shadowBlur=8;ctx.shadowColor=arcCol;
    ctx.beginPath();ctx.arc(cx,cy,11,-Math.PI/2,-Math.PI/2+ratio*Math.PI*2);ctx.stroke();
    // Low-time pulse ring
    if(sp.alive&&sp.time<15){
      ctx.globalAlpha=Math.abs(Math.sin(now/100))*0.5;
      ctx.strokeStyle='#ff2222';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(cx,cy,15,0,Math.PI*2);ctx.stroke();
    }
    // Label
    ctx.globalAlpha=0.7;ctx.fillStyle='#fff';ctx.shadowBlur=0;
    ctx.font='7px "Courier New"';ctx.textAlign='center';
    const idx=srvPlayers.indexOf(sp);
    ctx.fillText(`P${idx+1}`,cx,cy-15);
    ctx.restore();
  }

  // Death bursts
  ctx.save();
  for(const db of deathBursts){
    ctx.globalAlpha=db.life*0.7;
    ctx.strokeStyle='#fff';ctx.lineWidth=2;
    ctx.shadowBlur=12;ctx.shadowColor='#fff';
    ctx.beginPath();ctx.arc(db.x,db.y,db.r,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();

  // Phase flash overlay
  if(phaseFlash>0){
    ctx.save();ctx.globalAlpha=phaseFlash;
    ctx.fillStyle='#fff';ctx.fillRect(0,0,600,600);
    ctx.restore();
  }
}

// ── INPUT ──────────────────────────────────────────────────────────────────────
const KEY_MAP={
  'w':{slot:0,dir:'n'},'s':{slot:0,dir:'s'},
  'a':{slot:0,dir:'w'},'d':{slot:0,dir:'e'},
  'ArrowUp':{slot:1,dir:'n'},'ArrowDown':{slot:1,dir:'s'},
  'ArrowLeft':{slot:1,dir:'w'},'ArrowRight':{slot:1,dir:'e'}
};
const keyCooldowns={};

window.addEventListener('keydown',e=>{
  if(curScreen!=='game')return;
  const k=KEY_MAP[e.key];
  if(!k)return;
  e.preventDefault();
  const mp=myPlayers.find(p=>p.slot===k.slot);
  if(!mp||!mp.id)return;
  const sp=srvPlayers.find(p=>p.id===mp.id);
  if(!sp||!sp.alive)return;
  const now=performance.now();
  if(keyCooldowns[k.slot]&&now<keyCooldowns[k.slot])return;
  keyCooldowns[k.slot]=now+110;
  send({type:'move',slot:k.slot,dir:k.dir});
});

// ── BOOT ──────────────────────────────────────────────────────────────────────
connectWS();
</script>
